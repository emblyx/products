name: Question
description: Ask a question about an Emblyx product
title: "[QUESTION] "
labels:
  - question

body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: |
        Product:

        My question is...
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Optional screenshots, logs, or other relevant details.